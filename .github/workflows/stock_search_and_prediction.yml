name: Stock Search and Prediction Test

on:
  push:
    branches:
      - testing  
      - backend 
      - main 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'  # latest python vers in 3.

    - name: Install dependencies # to ensure dependencies are up to date run pip freeze > requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools wheel
        pip install -r requirements.txt

    - name: Run tests
      run:  python -m unittest #if this doesn't work try npm run
