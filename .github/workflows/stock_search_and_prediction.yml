name: Stock Search and Prediction Test

on:
  push:
    branches:
      - testing  
      - backend 
      - main 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Cache -- makes tests run a lot faster!
      uses: actions/cache@v4  
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'  # 3.x does latest version in 3

    - name: Install dependencies # to ensure dependencies are up to date run pip freeze > requirements.txt
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade setuptools wheel
        pip install -r requirements.txt

    - name: Run tests
      run:  python -m unittest #if this doesn't work try python -m unittest discover
